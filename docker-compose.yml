services:
  mysql:
    image: mysql:8.4
    container_name: moodle-tools-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: moodle_tools
      MYSQL_USER: moodle_tools
      MYSQL_PASSWORD: moodle_tools
    ports:
      - "3306:3306"
    volumes:
      - moodle_tools_mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  moodle_tools_mysql_data:
